<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Energy - Verify OTP</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top left, #16213e, #0b0f1a 60%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .card {
        width: 420px;
        max-width: 100%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        padding: 28px;
        text-align: center;
    }

    .logo {
        width: 60px;
        height: 50px;
        object-fit: contain;
        margin-bottom: 10px;
    }

    h1 {
        margin: 0 0 10px;
        font-size: 24px;
        color: #1e293b;
    }

    p {
        margin: 0 0 20px;
        color: #475569;
        font-size: 14px;
        line-height: 1.5;
    }

    .delivery-status {
        margin: -8px 0 16px;
        color: #475569;
        font-size: 13px;
        line-height: 1.4;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 20px;
        letter-spacing: 8px;
        text-align: center;
        box-sizing: border-box;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    button {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #364974;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background-color: #1d4ed8;
    }

    .message {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
        font-weight: 600;
    }

    .message.success {
        color: #047857;
    }

    .message.error {
        color: #b91c1c;
    }

    .back-link {
        display: inline-block;
        margin-top: 14px;
        color: #2563eb;
        text-decoration: none;
        font-size: 14px;
    }
</style>
<script>
const API_BASE_URL = "http://localhost:8081";

function getEmailFromQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get("email") || "";
}

function getDeliveryMessageFromQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get("delivery") || "";
}

function showMessage(text, type) {
    const message = document.getElementById("message");
    message.textContent = text;
    message.className = "message " + type;
}

async function verifyOtp(event) {
    event.preventDefault();

    const email = getEmailFromQuery();
    const otp = document.getElementById("otp").value.trim();

    if (!email) {
        showMessage("Missing email. Please create account again.", "error");
        return false;
    }

    if (!otp || otp.length !== 6) {
        showMessage("Please enter a valid 6-digit OTP", "error");
        return false;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/auth/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message || "Invalid OTP");
        }

        showMessage("Account Created Successfully", "success");
        setTimeout(() => {
            window.location.href = "sign_in.html";
        }, 1500);
    } catch (error) {
        showMessage(error.message || "Invalid OTP", "error");
    }

    return false;
}

window.onload = function() {
    const email = getEmailFromQuery();
    const deliveryMessage = getDeliveryMessageFromQuery();

    if (email) {
        document.getElementById("emailText").textContent = email;
    }

    const otpInfo = document.getElementById("otpInfo");
    const otpDeliveryStatus = document.getElementById("otpDeliveryStatus");
    if (deliveryMessage) {
        otpDeliveryStatus.textContent = deliveryMessage;
        const sentByEmail = deliveryMessage.toLowerCase().includes("sent successfully to your email");
        otpInfo.textContent = sentByEmail
            ? "We sent a 6-digit OTP to "
            : "Email delivery is not configured. Use OTP from backend logs for ";
    }
};
</script>
</head>
<body>
<div class="card">
    <img src="/loginlogo.png" alt="Logo" class="logo">
    <h1>Enter OTP</h1>
    <p><span id="otpInfo">We sent a 6-digit OTP to </span><strong id="emailText">your email</strong>.</p>
    <div id="otpDeliveryStatus" class="delivery-status"></div>

    <form onsubmit="return verifyOtp(event)">
        <input id="otp" type="text" maxlength="6" pattern="\d{6}" placeholder="000000" required>
        <button type="submit">Verify OTP</button>
    </form>

    <div id="message" class="message"></div>
    <a class="back-link" href="login.html">Back to Create Account</a>
</div>
</body>
</html>
