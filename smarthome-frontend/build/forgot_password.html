<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: radial-gradient(circle at top left, #16213e, #0b0f1a 60%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { width: 420px; max-width: 100%; background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    h1 { margin: 0 0 12px; text-align: center; color: #1e293b; }
    p { margin: 0 0 18px; text-align: center; color: #475569; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    button { width: 100%; margin-top: 16px; padding: 12px; border: 0; border-radius: 8px; background: #364974; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .7; cursor: not-allowed; }
    .message { min-height: 20px; margin-top: 12px; font-size: 14px; font-weight: 600; }
    .message.error { color: #b91c1c; }
    .message.success { color: #047857; }
    .back-link { display: block; margin-top: 14px; text-align: center; color: #2563eb; text-decoration: none; }
</style>
<script>
const API_BASE_URL = "http://localhost:8081";

function showMessage(text, type) {
  const message = document.getElementById("message");
  message.textContent = text;
  message.className = "message " + type;
}

async function handleForgotPassword(event) {
  event.preventDefault();
  const email = document.getElementById("email").value.trim();
  const submitButton = document.getElementById("sendOtpBtn");

  if (!email) {
    showMessage("Please enter your email.", "error");
    return false;
  }

  submitButton.disabled = true;
  submitButton.textContent = "Sending OTP...";

  try {
    const response = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.message || "Unable to send OTP.");
    }

    showMessage(data.message || "OTP sent successfully.", "success");
    window.location.href = `verify_otp.html?email=${encodeURIComponent(email)}`;
  } catch (error) {
    showMessage(error.message || "Something went wrong.", "error");
    submitButton.disabled = false;
    submitButton.textContent = "Send OTP";
  }

  return false;
}
</script>
</head>
<body>
<div class="card">
  <h1>Forgot Password</h1>
  <p>Enter your registered email to receive an OTP.</p>
  <form onsubmit="return handleForgotPassword(event)">
    <label for="email">Email Address</label>
    <input id="email" type="email" required placeholder="Enter registered email">
    <button id="sendOtpBtn" type="submit">Send OTP</button>
  </form>
  <div id="message" class="message"></div>
  <a class="back-link" href="sign_in.html">Back to Sign In</a>
</div>
</body>
</html>
