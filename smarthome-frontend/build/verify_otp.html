<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: radial-gradient(circle at top left, #16213e, #0b0f1a 60%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { width: 420px; max-width: 100%; background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    h1 { margin: 0 0 12px; text-align: center; color: #1e293b; }
    p { margin: 0 0 18px; text-align: center; color: #475569; }
    input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 22px; letter-spacing: 8px; text-align: center; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    button { width: 100%; margin-top: 16px; padding: 12px; border: 0; border-radius: 8px; background: #364974; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .message { min-height: 20px; margin-top: 12px; font-size: 14px; font-weight: 600; }
    .message.error { color: #b91c1c; }
    .message.success { color: #047857; }
    .back-link { display: block; margin-top: 14px; text-align: center; color: #2563eb; text-decoration: none; }
</style>
<script>
const API_BASE_URL = "http://localhost:8081";

function getEmail() {
  const params = new URLSearchParams(window.location.search);
  return params.get("email") || "";
}

function showMessage(text, type) {
  const message = document.getElementById("message");
  message.textContent = text;
  message.className = "message " + type;
}

async function handleVerifyOtp(event) {
  event.preventDefault();
  const email = getEmail();
  const otp = document.getElementById("otp").value.trim();

  if (!email) {
    showMessage("Missing email. Start forgot password again.", "error");
    return false;
  }

  if (!/^\d{6}$/.test(otp)) {
    showMessage("Enter a valid 6-digit OTP.", "error");
    return false;
  }

  try {
    const response = await fetch(`${API_BASE_URL}/api/auth/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.message || "Invalid OTP");
    }

    showMessage(data.message || "OTP verified successfully.", "success");
    setTimeout(() => {
      window.location.href = `reset_password.html?email=${encodeURIComponent(email)}`;
    }, 1000);
  } catch (error) {
    showMessage(error.message || "Invalid OTP", "error");
  }

  return false;
}

window.onload = function() {
  const email = getEmail();
  if (email) {
    document.getElementById("emailText").textContent = email;
  }
};
</script>
</head>
<body>
<div class="card">
  <h1>Verify OTP</h1>
  <p>Enter the OTP sent to <strong id="emailText">your email</strong>.</p>
  <form onsubmit="return handleVerifyOtp(event)">
    <input id="otp" type="text" maxlength="6" pattern="\d{6}" placeholder="000000" required>
    <button type="submit">Verify OTP</button>
  </form>
  <div id="message" class="message"></div>
  <a class="back-link" href="forgot_password.html">Back to Forgot Password</a>
</div>
</body>
</html>
